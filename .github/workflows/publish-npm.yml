name: Publish

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm test

  bump:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}
      bumped: ${{ steps.compute.outputs.bumped }}
    steps:
      - uses: actions/checkout@v5
      - name: Compute publish version
        id: compute
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          LATEST=$(npm view @lopatnov/express-reverse-proxy version 2>/dev/null || echo "0.0.0")
          if npm view "@lopatnov/express-reverse-proxy@$LOCAL" version &>/dev/null; then
            echo "v$LOCAL already on npm — bumping patch from v$LATEST"
            if [ "$LATEST" != "$LOCAL" ]; then
              npm version $LATEST --no-git-tag-version
            fi
            npm version patch --no-git-tag-version
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "v$LOCAL not yet on npm — publishing as-is"
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi
          TARGET=$(node -p "require('./package.json').version")
          echo "version=$TARGET" >> $GITHUB_OUTPUT
          echo "Will publish v$TARGET"

  publish-npm:
    needs: bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Set version ${{ needs.bump.outputs.version }}
        run: |
          TARGET="${{ needs.bump.outputs.version }}"
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$TARGET" != "$LOCAL" ]; then
            npm version $TARGET --no-git-tag-version
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    needs: bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set version ${{ needs.bump.outputs.version }}
        run: |
          TARGET="${{ needs.bump.outputs.version }}"
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$TARGET" != "$LOCAL" ]; then
            npm version $TARGET --no-git-tag-version
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@lopatnov"
      - run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-version:
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.BUMP_TOKEN }}
      - name: Push version bump to git
        run: |
          TARGET="${{ needs.bump.outputs.version }}"
          npm version $TARGET --no-git-tag-version
          git config user.name "publish-bot"
          git config user.email "lopatniov+publishbot@gmail.com"
          git add package.json package-lock.json
          git commit -m "chore: bump to v$TARGET [skip ci]"
          git push
