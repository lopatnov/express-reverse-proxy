name: Publish

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm test

  bump:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Compute publish version
        id: compute
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          LATEST=$(npm view @lopatnov/express-reverse-proxy version 2>/dev/null || echo "0.0.0")
          if npm view "@lopatnov/express-reverse-proxy@$LOCAL" version &>/dev/null; then
            echo "v$LOCAL already on npm ‚Äî bumping patch from v$LATEST"
            if [ "$LATEST" != "$LOCAL" ]; then
              npm version $LATEST --no-git-tag-version
            fi
            npm version patch --no-git-tag-version
          else
            echo "v$LOCAL not yet on npm ‚Äî publishing as-is"
          fi
          TARGET=$(node -p "require('./package.json').version")
          echo "version=$TARGET" >> $GITHUB_OUTPUT
          echo "Will publish v$TARGET"

  publish-npm:
    needs: bump
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Set version ${{ needs.bump.outputs.version }}
        run: |
          TARGET="${{ needs.bump.outputs.version }}"
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$TARGET" != "$LOCAL" ]; then
            npm version $TARGET --no-git-tag-version
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    needs: bump
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set version ${{ needs.bump.outputs.version }}
        run: |
          TARGET="${{ needs.bump.outputs.version }}"
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$TARGET" != "$LOCAL" ]; then
            npm version $TARGET --no-git-tag-version
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@lopatnov"
      - run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
